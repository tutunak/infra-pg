---
# Point-in-time recovery playbook using WAL-G.
#
# DESTRUCTIVE — wipes PGDATA and restores from backup.
# Requires explicit confirmation via extra var.
#
# Required extra vars:
#   target_host      — inventory hostname to restore on
#   restore_time     — target recovery time (UTC), e.g. "2026-04-18 14:30:00"
#   restore_confirm  — must be set to exactly "yes" to proceed
#
# Example:
#   ansible-playbook playbooks/restore.yml \
#     -i inventory/hosts.yml \
#     -e "target_host=myserver restore_time='2026-04-18 14:30:00' restore_confirm=yes"

- name: Restore PostgreSQL from WAL-G backup (PITR)
  hosts: "{{ target_host }}"
  become: true
  vars:
    pg_service: "postgresql-{{ pg_version }}"

  pre_tasks:
    - name: Assert restore_confirm is 'yes'
      ansible.builtin.assert:
        that:
          - restore_confirm is defined
          - restore_confirm == 'yes'
        fail_msg: >
          Safety check failed. You must pass -e "restore_confirm=yes" to confirm
          that you want to DESTROY the current PostgreSQL data and restore from backup.

    - name: Assert restore_time is defined and valid
      ansible.builtin.assert:
        that:
          - restore_time is defined
          - restore_time | length > 0
          - restore_time | regex_search('^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$')
        fail_msg: >
          restore_time is required and must match 'YYYY-MM-DD HH:MM:SS'.
          Pass -e "restore_time='2026-04-18 14:30:00'"

    - name: Assert pg_data_dir is defined and safe
      ansible.builtin.assert:
        that:
          - pg_data_dir is defined
          - pg_data_dir | length > 10
        fail_msg: >
          pg_data_dir is undefined or suspiciously short (got: '{{ pg_data_dir | default('') }}').
          Refusing to wipe an unintended directory.

  tasks:
    # ------------------------------------------------------------------ #
    # 1. Stop backup timer and PostgreSQL
    # ------------------------------------------------------------------ #
    - name: Stop walg-backup.timer to prevent backup interference during restore
      ansible.builtin.service:
        name: walg-backup.timer
        state: stopped
      failed_when: false

    - name: Stop postgresql-{{ pg_version }} service
      ansible.builtin.service:
        name: "{{ pg_service }}"
        state: stopped

    # ------------------------------------------------------------------ #
    # 2. Wipe data directory  *** DATA LOSS — confirmed above ***
    # ------------------------------------------------------------------ #
    - name: "[DESTRUCTIVE] Wipe PGDATA to prepare for restore"
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        state: absent

    - name: Recreate empty PGDATA directory
      ansible.builtin.file:
        path: "{{ pg_data_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0700"

    # ------------------------------------------------------------------ #
    # 3. Fetch latest backup via WAL-G
    # ------------------------------------------------------------------ #
    - name: Copy walg-restore.sh to target host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/walg-restore.sh"
        dest: /usr/local/bin/walg-restore.sh
        owner: root
        group: root
        mode: "0755"

    - name: Fetch latest WAL-G backup into PGDATA
      ansible.builtin.command:
        cmd: /usr/local/bin/walg-restore.sh
      environment:
        PGDATA: "{{ pg_data_dir }}"
      become_user: postgres
      changed_when: true

    # ------------------------------------------------------------------ #
    # 4. Write recovery settings (postgresql.auto.conf, recovery.signal)
    # ------------------------------------------------------------------ #
    - name: Write recovery settings into postgresql.auto.conf
      ansible.builtin.blockinfile:
        path: "{{ pg_data_dir }}/postgresql.auto.conf"
        create: true
        owner: postgres
        group: postgres
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED RECOVERY SETTINGS"
        block: |
          recovery_target_time = '{{ restore_time }}'
          recovery_target_action = 'promote'

    - name: Write recovery.signal to trigger PITR mode
      ansible.builtin.copy:
        dest: "{{ pg_data_dir }}/recovery.signal"
        content: ""
        owner: postgres
        group: postgres
        mode: "0600"

    # ------------------------------------------------------------------ #
    # 5. Start PostgreSQL — it will replay WAL up to restore_time
    # ------------------------------------------------------------------ #
    - name: Start postgresql-{{ pg_version }} service
      ansible.builtin.service:
        name: "{{ pg_service }}"
        state: started

  post_tasks:
    # ------------------------------------------------------------------ #
    # 6. Wait for recovery to complete (pg_is_in_recovery() → false)
    # ------------------------------------------------------------------ #
    - name: Wait for PostgreSQL to finish recovery and promote
      community.postgresql.postgresql_query:
        db: postgres
        query: "SELECT pg_is_in_recovery()"
        login_user: postgres
      become_user: postgres
      register: pg_recovery_check
      failed_when: false
      until: >-
        pg_recovery_check.query_result is defined
        and pg_recovery_check.query_result | length > 0
        and not pg_recovery_check.query_result[0]['pg_is_in_recovery']
      retries: 360
      delay: 10

    - name: Assert recovery completed successfully
      ansible.builtin.assert:
        that:
          - pg_recovery_check.query_result is defined
          - pg_recovery_check.query_result | length > 0
          - not pg_recovery_check.query_result[0]['pg_is_in_recovery']
        fail_msg: >
          PostgreSQL did not complete recovery within the timeout (3600s).
          Check PostgreSQL logs on {{ inventory_hostname }} for WAL replay errors.

    # ------------------------------------------------------------------ #
    # 7. Remove recovery settings from postgresql.auto.conf
    # NOTE: recovery_target_time and recovery_target_action are
    # postmaster-context parameters in PostgreSQL 17 and cannot be
    # removed via ALTER SYSTEM RESET after server start. Use blockinfile
    # with state: absent to remove the block we wrote in step 4.
    # ------------------------------------------------------------------ #
    - name: Remove recovery settings block from postgresql.auto.conf
      ansible.builtin.blockinfile:
        path: "{{ pg_data_dir }}/postgresql.auto.conf"
        marker: "# {mark} ANSIBLE MANAGED RECOVERY SETTINGS"
        state: absent

    - name: Remove recovery.signal if still present after promotion
      ansible.builtin.file:
        path: "{{ pg_data_dir }}/recovery.signal"
        state: absent

    - name: Re-enable walg-backup.timer after restore
      ansible.builtin.service:
        name: walg-backup.timer
        state: started
        enabled: true
