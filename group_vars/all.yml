---
# PostgreSQL version
pg_version: 17

# PostgreSQL data directory — must be defined here so standalone playbooks
# (restore.yml, add-database.yml) can reference it without loading role defaults.
pg_data_dir: "/var/lib/pgsql/{{ pg_version }}/data"

# Private subnet that app VMs reside on — used by firewall role
pg_private_subnet: "10.0.0.0/24"

# Name of the private network interface on the PG host
# Override per host in host_vars/<host>/vars.yml if NIC name differs
pgbouncer_private_iface: "eth1"

# WAL-G release tag — pin a specific version for reproducibility
walg_version: "v3.0.3"

# Archive command injected into postgresql.conf by the postgres role.
# Set here so the postgres template picks up the correct value on every run,
# avoiding idempotency failures from the walg role patching the file post-template.
pg_archive_command: "set -a; source /etc/wal-g/env; set +a && /usr/local/bin/wal-g wal-push %p"

# S3 / object-storage credentials — values come from vault
walg_s3_bucket:     "{{ vault_walg_s3_bucket }}"
walg_s3_endpoint:   "{{ vault_walg_s3_endpoint }}"
walg_s3_region:     "{{ vault_walg_s3_region }}"
walg_s3_access_key: "{{ vault_walg_s3_access_key }}"
walg_s3_secret_key: "{{ vault_walg_s3_secret_key }}"
