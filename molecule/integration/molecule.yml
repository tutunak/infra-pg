---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: pg-integration
    image: docker.io/geerlingguy/docker-rockylinux9-ansible:latest
    command: /usr/lib/systemd/systemd
    privileged: true
    tmpfs:
      /run: "rw,size=65536k,mode=755"
      /tmp: "rw,size=65536k,mode=755"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    capabilities:
      - NET_ADMIN
      - SYS_ADMIN
    groups:
      - pg_servers

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks
  inventory:
    host_vars:
      pg-integration:
        pgbouncer_private_iface: "dummy0"
        pg_databases:
          - name: testapp_db
            owner: testapp_user
            password: "testpassword123"
        walg_s3_bucket: "test-bucket"
        walg_s3_endpoint: "http://localhost:9000"
        walg_s3_region: "us-east-1"
        walg_s3_access_key: "minioaccess"
        walg_s3_secret_key: "miniosecret"
        # Pre-set so postgres role templates the correct archive_command on both
        # converge runs, preventing idempotency failures from the walg lineinfile task.
        pg_archive_command: "set -a; . /etc/wal-g/env; set +a; /usr/local/bin/wal-g wal-push %p"
        # Vault vars — fake values for testing
        vault_walg_s3_bucket: "test-bucket"
        vault_walg_s3_endpoint: "http://localhost:9000"
        vault_walg_s3_region: "us-east-1"
        vault_walg_s3_access_key: "minioaccess"
        vault_walg_s3_secret_key: "miniosecret"

lint: |
  set -e
  yamllint .
  ansible-lint
