---
- name: Verify integration — all roles working together
  hosts: all
  become: true
  gather_facts: true

  tasks:
    # ------------------------------------------------------------------ #
    # Service facts
    # ------------------------------------------------------------------ #
    - name: Gather service facts
      ansible.builtin.service_facts:

    # ------------------------------------------------------------------ #
    # PostgreSQL
    # ------------------------------------------------------------------ #
    - name: Assert postgresql-17 service is active
      ansible.builtin.assert:
        that:
          - "'postgresql-17.service' in ansible_facts.services"
          - "ansible_facts.services['postgresql-17.service']['state'] == 'running'"
        fail_msg: "postgresql-17 service is not running"

    - name: Check socket/port bindings
      ansible.builtin.command: ss -tlnp
      register: ss_output
      changed_when: false

    - name: Assert port 5432 is bound
      ansible.builtin.assert:
        that:
          - "'5432' in ss_output.stdout"
        fail_msg: "Port 5432 is not bound — PostgreSQL may not be listening"

    - name: Assert port 5432 is NOT bound to 0.0.0.0 (localhost only)
      ansible.builtin.assert:
        that:
          - not (ss_output.stdout | regex_search('0\\.0\\.0\\.0:5432'))
        fail_msg: "Port 5432 is bound to 0.0.0.0 — should be localhost only"

    - name: Assert scram-sha-256 in pg_hba.conf
      ansible.builtin.slurp:
        src: /var/lib/pgsql/17/data/pg_hba.conf
      register: pg_hba_content

    - name: Assert pg_hba.conf uses scram-sha-256
      ansible.builtin.assert:
        that:
          - "'scram-sha-256' in (pg_hba_content.content | b64decode)"
        fail_msg: "scram-sha-256 not found in pg_hba.conf"

    - name: Read postgresql.conf
      ansible.builtin.slurp:
        src: /var/lib/pgsql/17/data/postgresql.conf
      register: pg_conf_content

    - name: Assert archive_command contains wal-g
      ansible.builtin.assert:
        that:
          - "'wal-g' in (pg_conf_content.content | b64decode)"
        fail_msg: "archive_command does not reference wal-g in postgresql.conf"

    - name: Check test database exists
      ansible.builtin.command: >
        /usr/pgsql-17/bin/psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='testapp_db';"
      become_user: postgres
      register: db_check
      changed_when: false

    - name: Assert testapp_db exists
      ansible.builtin.assert:
        that:
          - "db_check.stdout | trim == '1'"
        fail_msg: "testapp_db does not exist in PostgreSQL"

    # ------------------------------------------------------------------ #
    # PgBouncer
    # ------------------------------------------------------------------ #
    - name: Assert pgbouncer service is active
      ansible.builtin.assert:
        that:
          - "'pgbouncer.service' in ansible_facts.services"
          - "ansible_facts.services['pgbouncer.service']['state'] == 'running'"
        fail_msg: "pgbouncer service is not running"

    - name: Assert port 6432 is bound (PgBouncer listening)
      ansible.builtin.assert:
        that:
          - "'6432' in ss_output.stdout"
        fail_msg: "Port 6432 is not bound — PgBouncer may not be listening"

    - name: Read pgbouncer.ini
      ansible.builtin.slurp:
        src: /etc/pgbouncer/pgbouncer.ini
      register: pgbouncer_ini_content

    - name: Assert PgBouncer pool_mode is transaction
      ansible.builtin.assert:
        that:
          - "'pool_mode = transaction' in (pgbouncer_ini_content.content | b64decode)"
        fail_msg: "pool_mode is not transaction in pgbouncer.ini"

    - name: Assert PgBouncer auth_type is scram-sha-256
      ansible.builtin.assert:
        that:
          - "'auth_type = scram-sha-256' in (pgbouncer_ini_content.content | b64decode)"
        fail_msg: "auth_type is not scram-sha-256 in pgbouncer.ini"

    - name: Check userlist.txt permissions
      ansible.builtin.stat:
        path: /etc/pgbouncer/userlist.txt
      register: userlist_stat

    - name: Assert userlist.txt has mode 0600
      ansible.builtin.assert:
        that:
          - "userlist_stat.stat.mode == '0600'"
        fail_msg: "userlist.txt does not have mode 0600"

    - name: Connect through PgBouncer with test user credentials
      ansible.builtin.command: >
        /usr/pgsql-17/bin/psql
        "host=10.0.0.1 port=6432 dbname=testapp_db user=testapp_user password=testpassword123"
        -c "SELECT 1;"
      register: pgbouncer_connect
      changed_when: false
      failed_when: pgbouncer_connect.rc != 0

    - name: Assert PgBouncer connection succeeded
      ansible.builtin.assert:
        that:
          - pgbouncer_connect.rc == 0
        fail_msg: "Could not connect through PgBouncer: {{ pgbouncer_connect.stderr | default('') }}"

    # ------------------------------------------------------------------ #
    # WAL-G
    # ------------------------------------------------------------------ #
    - name: Check wal-g binary exists
      ansible.builtin.stat:
        path: /usr/local/bin/wal-g
      register: walg_binary

    - name: Assert wal-g binary exists and is executable
      ansible.builtin.assert:
        that:
          - walg_binary.stat.exists
          - walg_binary.stat.executable
        fail_msg: "wal-g binary is missing or not executable at /usr/local/bin/wal-g"

    - name: Check /etc/wal-g/env permissions
      ansible.builtin.stat:
        path: /etc/wal-g/env
      register: walg_env_stat

    - name: Assert /etc/wal-g/env exists with mode 0640
      ansible.builtin.assert:
        that:
          - walg_env_stat.stat.exists
          - walg_env_stat.stat.mode == '0640'
        fail_msg: "/etc/wal-g/env is missing or has wrong permissions"

    - name: Check walg-backup.timer is enabled
      ansible.builtin.command: systemctl is-enabled walg-backup.timer
      register: timer_enabled
      changed_when: false
      failed_when: false

    - name: Assert walg-backup.timer is enabled
      ansible.builtin.assert:
        that:
          - timer_enabled.stdout == 'enabled'
        fail_msg: "walg-backup.timer is not enabled (got: {{ timer_enabled.stdout | default('not found') }})"

    # ------------------------------------------------------------------ #
    # Firewall
    # ------------------------------------------------------------------ #
    - name: Assert firewalld service is active
      ansible.builtin.assert:
        that:
          - "'firewalld.service' in ansible_facts.services"
          - "ansible_facts.services['firewalld.service']['state'] == 'running'"
        fail_msg: "firewalld service is not running"

    - name: Get rich rules in internal zone
      ansible.builtin.command: firewall-cmd --zone=internal --list-rich-rules
      register: internal_rich_rules
      changed_when: false

    - name: Assert rich rule for TCP 6432 from private subnet is present
      ansible.builtin.assert:
        that:
          - "'6432' in internal_rich_rules.stdout"
          - "'10.0.0.0/24' in internal_rich_rules.stdout"
        fail_msg: "Rich rule for TCP 6432 from 10.0.0.0/24 not found in internal zone"

    - name: Get ports in public zone
      ansible.builtin.command: firewall-cmd --zone=public --list-ports
      register: public_ports
      changed_when: false

    - name: Assert port 5432 is absent from public zone
      ansible.builtin.assert:
        that:
          - "'5432' not in public_ports.stdout"
        fail_msg: "Port 5432 is exposed in the public zone"

    - name: Assert port 6432 is absent from public zone
      ansible.builtin.assert:
        that:
          - "'6432' not in public_ports.stdout"
        fail_msg: "Port 6432 is exposed in the public zone"

    - name: Get services in public zone
      ansible.builtin.command: firewall-cmd --zone=public --list-services
      register: public_services
      changed_when: false

    - name: Assert SSH is present in public zone
      ansible.builtin.assert:
        that:
          - "'ssh' in public_services.stdout"
        fail_msg: "SSH service is not present in the public zone"
