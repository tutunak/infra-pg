---
- name: Prepare container for integration testing
  hosts: all
  gather_facts: true

  tasks:
    - name: Wait for systemd to be ready
      ansible.builtin.command: systemctl is-system-running
      register: systemd_status
      until: systemd_status.stdout in ['running', 'degraded']
      retries: 20
      delay: 3
      changed_when: false
      failed_when: false

    - name: Install PGDG apt signing key
      ansible.builtin.get_url:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        dest: /usr/share/keyrings/pgdg.asc
        mode: "0644"

    - name: Add PGDG apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        state: present
        filename: pgdg

    - name: Install all prerequisites
      ansible.builtin.apt:
        name:
          - python3-psycopg2
          - python3
          - iproute2
          - net-tools
          - wget
          - ufw
          - dbus
        state: present
        update_cache: true

    - name: Ensure pgbouncer system group exists
      ansible.builtin.group:
        name: pgbouncer
        system: true
        state: present

    - name: Ensure pgbouncer system user exists
      ansible.builtin.user:
        name: pgbouncer
        system: true
        group: pgbouncer
        create_home: false
        shell: /usr/sbin/nologin
        state: present

    - name: Start dbus service
      ansible.builtin.service:
        name: dbus
        state: started
        enabled: true

    - name: Load dummy kernel module
      ansible.builtin.command: modprobe dummy
      changed_when: false
      failed_when: false

    - name: Create dummy0 network interface
      ansible.builtin.command: ip link add dummy0 type dummy
      register: dummy_create
      changed_when: dummy_create.rc == 0
      failed_when: dummy_create.rc != 0 and 'already exists' not in dummy_create.stderr

    - name: Assign IP address to dummy0
      ansible.builtin.command: ip addr add 10.0.0.1/24 dev dummy0
      register: dummy_addr
      changed_when: dummy_addr.rc == 0
      failed_when: dummy_addr.rc != 0 and 'already exists' not in dummy_addr.stderr

    - name: Bring up dummy0 interface
      ansible.builtin.command: ip link set dummy0 up
      changed_when: false
