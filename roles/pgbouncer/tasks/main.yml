---
# --------------------------------------------------------------------------- #
# 1. Prerequisites
# --------------------------------------------------------------------------- #
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

# --------------------------------------------------------------------------- #
# 2. PGDG repository (idempotent if already installed by postgres role)
# --------------------------------------------------------------------------- #
- name: Download PGDG GPG key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /usr/share/keyrings/pgdg.asc
    mode: "0644"
  register: pgdg_key_download
  retries: 3
  delay: 5
  until: pgdg_key_download is not failed

- name: Add PGDG apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    filename: pgdg
    state: present

# --------------------------------------------------------------------------- #
# 3. Install PgBouncer
# --------------------------------------------------------------------------- #
- name: Install pgbouncer package
  ansible.builtin.apt:
    name: pgbouncer
    state: present
    update_cache: true

- name: Check installed PgBouncer version
  ansible.builtin.command: pgbouncer --version
  register: pgbouncer_version_out
  changed_when: false

- name: Extract PgBouncer version string
  ansible.builtin.set_fact:
    pgbouncer_installed_version: "{{ pgbouncer_version_out.stdout | regex_search('(\\d+\\.\\d+\\.\\d+)', '\\1') | first }}"

- name: Assert PgBouncer meets minimum version for SCRAM-SHA-256
  ansible.builtin.assert:
    that:
      - pgbouncer_installed_version is version(pgbouncer_min_version, '>=')
    fail_msg: >
      PgBouncer {{ pgbouncer_installed_version }} is below the minimum required version
      {{ pgbouncer_min_version }} (needed for scram-sha-256 auth_type).

# --------------------------------------------------------------------------- #
# 4. Gather facts for private interface IP
# --------------------------------------------------------------------------- #
- name: Gather network facts
  ansible.builtin.setup:
    gather_subset:
      - network
  when: ansible_facts[pgbouncer_private_iface] is not defined

# --------------------------------------------------------------------------- #
# 5. Configuration files
# --------------------------------------------------------------------------- #
- name: Template pgbouncer.ini
  ansible.builtin.template:
    src: pgbouncer.ini.j2
    dest: /etc/pgbouncer/pgbouncer.ini
    owner: postgres
    group: pgbouncer
    mode: "0640"
  notify: Reload pgbouncer

- name: Template userlist.txt
  ansible.builtin.template:
    src: userlist.txt.j2
    dest: /etc/pgbouncer/userlist.txt
    owner: postgres
    group: pgbouncer
    mode: "0600"
  notify: Reload pgbouncer
  no_log: true

# --------------------------------------------------------------------------- #
# 6. Ensure runtime directories exist
# --------------------------------------------------------------------------- #
- name: Ensure pgbouncer log directory exists
  ansible.builtin.file:
    path: /var/log/pgbouncer
    state: directory
    owner: postgres
    group: pgbouncer
    mode: "0750"

- name: Ensure pgbouncer pid directory exists
  ansible.builtin.file:
    path: /run/pgbouncer
    state: directory
    owner: postgres
    group: pgbouncer
    mode: "0755"

- name: Install tmpfiles.d entry for pgbouncer runtime directory
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/pgbouncer.conf
    content: "d /run/pgbouncer 0755 postgres pgbouncer -\n"
    owner: root
    group: root
    mode: "0644"

# --------------------------------------------------------------------------- #
# 7. Enable and start service
# --------------------------------------------------------------------------- #
- name: Enable and start pgbouncer
  ansible.builtin.service:
    name: pgbouncer
    enabled: true
    state: started
