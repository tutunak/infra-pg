---
# --------------------------------------------------------------------------- #
# 1. Download and install WAL-G binary (idempotent: skip if version matches)
# --------------------------------------------------------------------------- #
- name: Check installed WAL-G version
  ansible.builtin.command: "{{ walg_install_path }} --version"
  register: walg_installed_version
  changed_when: false
  failed_when: false

- name: Set fact — WAL-G needs install/update
  ansible.builtin.set_fact:
    walg_needs_install: >-
      {{
        walg_installed_version.rc != 0
        or not (walg_installed_version.stdout | default('')) is search((walg_version | regex_escape()) + '(\\s|$)')
      }}

- name: Download WAL-G binary
  ansible.builtin.get_url:
    url: "https://github.com/wal-g/wal-g/releases/download/{{ walg_version }}/wal-g-pg-rhel9-amd64"
    dest: "{{ walg_install_path }}"
    mode: "0755"
    owner: root
    group: root
    force: true
  when: walg_needs_install | bool

# --------------------------------------------------------------------------- #
# 2. Configuration directory and env file
# --------------------------------------------------------------------------- #
- name: Create WAL-G configuration directory
  ansible.builtin.file:
    path: "{{ walg_config_dir }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Template WAL-G env file
  ansible.builtin.template:
    src: walg-env.j2
    dest: "{{ walg_config_dir }}/env"
    owner: postgres
    group: postgres
    mode: "0600"
  no_log: true

# --------------------------------------------------------------------------- #
# 3. Systemd service and timer for nightly backups
# --------------------------------------------------------------------------- #
- name: Template walg-backup.service
  ansible.builtin.template:
    src: walg-backup.service.j2
    dest: /etc/systemd/system/walg-backup.service
    owner: root
    group: root
    mode: "0644"
  register: walg_service_unit

- name: Template walg-backup.timer
  ansible.builtin.template:
    src: walg-backup.timer.j2
    dest: /etc/systemd/system/walg-backup.timer
    owner: root
    group: root
    mode: "0644"
  register: walg_timer_unit

- name: Reload systemd daemon when unit files changed
  ansible.builtin.systemd:
    daemon_reload: true
  when: walg_service_unit is changed or walg_timer_unit is changed

- name: Enable and start walg-backup.timer
  ansible.builtin.service:
    name: walg-backup.timer
    enabled: true
    state: started
