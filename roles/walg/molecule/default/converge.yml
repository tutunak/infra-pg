---
- name: Converge — apply postgres role first, then walg role
  hosts: all
  become: true

  vars:
    pg_version: 17
    pg_data_dir: "/var/lib/pgsql/17/data"
    walg_s3_bucket: "test-bucket"
    walg_s3_endpoint: "http://localhost:9000"
    walg_s3_region: "us-east-1"
    walg_s3_access_key: "minioaccess"
    walg_s3_secret_key: "miniosecret"
    # Set archive_command here so postgres role templates it correctly on both
    # converge runs — prevents the restart handler from firing during idempotency.
    pg_archive_command: "set -a; . /etc/wal-g/env; set +a; /usr/local/bin/wal-g wal-push %p"

  roles:
    - role: postgres
    - role: walg
