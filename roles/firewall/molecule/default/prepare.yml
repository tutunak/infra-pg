---
- name: Prepare container for firewall testing
  hosts: all
  gather_facts: false

  tasks:
    - name: Wait for systemd to be ready
      ansible.builtin.command: systemctl is-system-running
      register: systemd_status
      until: systemd_status.stdout in ['running', 'degraded']
      retries: 20
      delay: 3
      changed_when: false
      failed_when: false

    - name: Install ufw and dbus
      ansible.builtin.apt:
        name:
          - ufw
          - dbus
        state: present
        update_cache: true

    - name: Start dbus service
      ansible.builtin.service:
        name: dbus
        state: started
        enabled: true
