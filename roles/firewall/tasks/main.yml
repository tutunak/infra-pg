---
# --------------------------------------------------------------------------- #
# 1. Install UFW
# --------------------------------------------------------------------------- #
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

# --------------------------------------------------------------------------- #
# 2. Enable UFW service
# --------------------------------------------------------------------------- #
- name: Enable and start ufw service
  ansible.builtin.service:
    name: ufw
    enabled: true
    state: started

# --------------------------------------------------------------------------- #
# 3. Configure firewall rules
# --------------------------------------------------------------------------- #
- name: Set default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming

- name: Allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Allow TCP 6432 from private subnet
  community.general.ufw:
    rule: allow
    port: "6432"
    proto: tcp
    src: "{{ pg_private_subnet }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
