---
# --------------------------------------------------------------------------- #
# 1. Prerequisites
# --------------------------------------------------------------------------- #
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

# --------------------------------------------------------------------------- #
# 2. PGDG repository
# --------------------------------------------------------------------------- #
- name: Download PGDG GPG key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /usr/share/keyrings/pgdg.asc
    mode: "0644"

- name: Add PGDG apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    filename: pgdg
    state: present

# --------------------------------------------------------------------------- #
# 3. Install packages
# --------------------------------------------------------------------------- #
- name: Install PostgreSQL {{ pg_version }} packages
  ansible.builtin.apt:
    name:
      - "postgresql-{{ pg_version }}"
      - python3-psycopg2
    state: present
    update_cache: true

# --------------------------------------------------------------------------- #
# 4. Configuration files
# --------------------------------------------------------------------------- #
- name: Template postgresql.conf
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify: Restart postgresql

- name: Template pg_hba.conf
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ pg_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0600"
  notify: Reload postgresql

# --------------------------------------------------------------------------- #
# 5. Enable and start service
# --------------------------------------------------------------------------- #
- name: Enable and start postgresql
  ansible.builtin.service:
    name: "postgresql@{{ pg_version }}-main"
    enabled: true
    state: started

# Flush handlers so PG is running before we create databases/users
- name: Flush handlers to apply config changes
  ansible.builtin.meta: flush_handlers

# --------------------------------------------------------------------------- #
# 6. Databases and users (idempotent via community.postgresql modules)
# Users must exist before databases that reference them as owner.
# --------------------------------------------------------------------------- #
- name: Create PostgreSQL users
  community.postgresql.postgresql_user:
    name: "{{ item.owner }}"
    password: "{{ item.password }}"
    state: present
    login_user: postgres
  become: true
  become_user: postgres
  loop: "{{ pg_databases }}"
  when: pg_databases | length > 0
  no_log: true

- name: Create PostgreSQL databases
  community.postgresql.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner }}"
    state: present
    login_user: postgres
  become: true
  become_user: postgres
  loop: "{{ pg_databases }}"
  when: pg_databases | length > 0

- name: Grant database privileges to owners
  community.postgresql.postgresql_privs:
    db: "{{ item.name }}"
    roles: "{{ item.owner }}"
    type: database
    privs: ALL
    state: present
    login_user: postgres
  become: true
  become_user: postgres
  loop: "{{ pg_databases }}"
  when: pg_databases | length > 0
