---
- name: Prepare container for PostgreSQL testing
  hosts: all
  gather_facts: true

  tasks:
    - name: Wait for systemd to be ready
      ansible.builtin.command: systemctl is-system-running
      register: systemd_status
      until: systemd_status.stdout in ['running', 'degraded']
      retries: 20
      delay: 3
      changed_when: false
      failed_when: false

    - name: Install prerequisite packages
      ansible.builtin.apt:
        name:
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Install PGDG apt signing key
      ansible.builtin.get_url:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        dest: /usr/share/keyrings/pgdg.asc
        mode: "0644"
      register: pgdg_key_download
      retries: 3
      delay: 5
      until: pgdg_key_download is not failed

    - name: Add PGDG apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/pgdg.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
        filename: pgdg
        state: present

    - name: Install Python psycopg2 and prerequisites
      ansible.builtin.apt:
        name:
          - python3-psycopg2
          - python3
        state: present

    - name: Install iproute2 and net-tools for verification
      ansible.builtin.apt:
        name:
          - iproute2
          - net-tools
        state: present
